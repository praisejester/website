<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
html, body {
margin: 0;
height: 100%;
overflow: hidden;

/* matched dark base */
background: radial-gradient(circle at center,
#0b0b0b 0%,
#070707 55%,
#000000 100%);

display: flex;
align-items: center;
justify-content: center;
font-family: Arial, sans-serif;
color: white;
}

/* VIGNETTE */
body::before {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
background: radial-gradient(circle,
rgba(0,0,0,0) 45%,
rgba(0,0,0,0.7) 100%);
z-index: 1;
}

/* VHS SCANLINES */
body::after {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 2;

background: repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
rgba(0,0,0,0) 3px,
rgba(0,0,0,0) 6px
);

animation: scanMove 6s linear infinite;
opacity: 0.35;
}

@keyframes scanMove {
0% { transform: translateY(0); }
100% { transform: translateY(6px); }
}

/* subtle noise layer */
.noise {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 3;
background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Random_Noise.png");
opacity: 0.04;
mix-blend-mode: overlay;
animation: noiseMove 0.2s infinite;
}

@keyframes noiseMove {
0% { transform: translate(0,0); }
25% { transform: translate(-2px,1px); }
50% { transform: translate(1px,-1px); }
75% { transform: translate(-1px,2px); }
100% { transform: translate(0,0); }
}

/* container */
.container {
display: flex;
flex-direction: column;
align-items: center;
transform: translateY(-40px);
position: relative;
z-index: 5;

/* subtle jitter */
animation: jitter 4s infinite;
}

@keyframes jitter {
0%, 100% { transform: translateY(-40px) translateX(0); }
50% { transform: translateY(-40px) translateX(1px); }
52% { transform: translateY(-40px) translateX(-1px); }
}

/* GIF */
img {
max-width: 80%;
max-height: 60vh;
object-fit: contain;

filter: drop-shadow(0 0 40px rgba(255,255,255,0.06));

mask-image: radial-gradient(circle,
rgba(0,0,0,1) 60%,
rgba(0,0,0,0) 100%);
-webkit-mask-image: radial-gradient(circle,
rgba(0,0,0,1) 60%,
rgba(0,0,0,0) 100%);
}

/* socials */
.socials {
margin-top: 20px;
display: flex;
gap: 20px;
}

a {
display: flex;
align-items: center;
gap: 8px;
text-decoration: none;
color: white;
font-size: 16px;
padding: 8px 12px;
border: 1px solid rgba(255,255,255,0.5);
border-radius: 8px;
transition: 0.2s;
}

a:hover {
background: white;
color: black;
}

.icon {
width: 18px;
height: 18px;
}

/* subtle global flicker */
body {
animation: flicker 8s infinite;
}

@keyframes flicker {
0%, 100% { opacity: 1; }
50% { opacity: 0.992; }
52% { opacity: 1; }
}
</style>
</head>

<script>

audio.volume = 0.2;
