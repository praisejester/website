<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jester System</title>

<style>
html, body {
margin: 0;
height: 100%;
overflow: hidden;
background: #050505;
color: white;
font-family: Arial, sans-serif;
}

#boot {
position: fixed;
inset: 0;
background: black;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 14px;
z-index: 999;
font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 4px;
text-transform: uppercase;
}

#boot.glitch #boot-text {
animation: bootShake 0.08s infinite;
}

@keyframes bootShake {
0% { transform: translate(0,0); }
25% { transform: translate(-2px,1px); }
50% { transform: translate(2px,-1px); }
75% { transform: translate(-1px,0); }
100% { transform: translate(0,0); }
}

#boot-text {
display: inline-block;
white-space: nowrap;
}

#progress-wrap {
height: 2px;
background: rgba(255,255,255,0.15);
position: relative;
border-radius: 2px;
}

#progress-bar {
position: absolute;
left: 0;
top: 0;
height: 100%;
width: 0%;
background: white;
border-radius: 2px;
box-shadow: 0 0 6px rgba(255,255,255,0.6);
animation: fillBar 0.9s ease forwards;
animation-delay: 0.1s;
}

@keyframes fillBar {
0%   { width: 0%; }
100% { width: 100%; }
}

.bg {
position: fixed;
inset: 0;
z-index: 0;
overflow: hidden;
}

.bg img {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
height: 100%;
min-width: 110%;
object-fit: cover;
object-position: bottom;
}

.overlay {
position: fixed;
inset: 0;
z-index: 1;
background: radial-gradient(circle,
rgba(0,0,0,0.2) 20%,
rgba(0,0,0,0.85) 100%);
}

body::after {
content: "";
position: fixed;
inset: 0;
z-index: 2;
pointer-events: none;
background: repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 3px,
transparent 6px
);
opacity: 0.25;
}

.noise {
position: fixed;
inset: 0;
z-index: 3;
pointer-events: none;
background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Random_Noise.png");
opacity: 0.03;
mix-blend-mode: overlay;
}

.container {
position: absolute;
top: 46%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 5;
display: flex;
flex-direction: column;
align-items: center;
visibility: hidden;
}

.socials {
margin-top: 18px;
display: flex;
gap: 20px;
}

a {
display: flex;
align-items: center;
gap: 8px;
text-decoration: none;
color: white;
font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 8px 12px;
border: 1px solid rgba(255,255,255,0.4);
border-radius: 8px;
}

a:hover {
background: white;
color: black;
}

.icon {
width: 18px;
height: 18px;
}
</style>
</head>

<body>

<div id="boot">
  <span id="boot-text">praisejester</span>
  <div id="progress-wrap">
    <div id="progress-bar"></div>
  </div>
</div>

<div class="bg">
  <img src="https://i.pinimg.com/originals/8e/db/ed/8edbeddba6976c96b582e546aede2b44.gif">
</div>

<div class="overlay"></div>
<div class="noise"></div>

<div class="container" id="main">
<div class="socials">

<a href="https://github.com/praisejester" target="_blank">
<svg class="icon" viewBox="0 0 24 24" fill="currentColor">
<path d="M12 .5C5.7.5.7 5.6.7 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2.1c-3.2.7-3.9-1.4-3.9-1.4-.5-1.2-1.2-1.5-1.2-1.5-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 .1.8 2.1 3.3 1.5.1-.7.4-1.1.7-1.4-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.4 1.2-3.3-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.4 1.2a11.5 11.5 0 0 1 6.2 0C16.8 5.1 17.8 5.4 17.8 5.4c.6 1.6.2 2.8.1 3.1.8.9 1.2 2 1.2 3.3 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1 .8 2v3c0 .3.2.7.8.6A10.9 10.9 0 0 0 23.3 12C23.3 5.6 18.3.5 12 .5z"/>
</svg>
GitHub
</a>

<a href="https://discord.gg/ujuPb2NJSz" target="_blank">
<svg class="icon" viewBox="0 0 24 24" fill="currentColor">
<path d="M20 4.6A16 16 0 0 0 16 3l-.2.4A14 14 0 0 0 12 3a14 14 0 0 0-3.8.4L8 3A16 16 0 0 0 4 4.6C1.6 8 1 11.4 1 14.7c0 0 1.8 3 6.5 3.3l.8-1c-3-.9-4.1-2.3-4.1-2.3.3.2.7.5 1 .6 2.5 1.1 4.4 1.4 6.8 1.4s4.3-.3 6.8-1.4c.3-.1.7-.4 1-.6 0 0-1.1 1.4-4.1 2.3l.8 1C21.2 17.7 23 14.7 23 14.7c0-3.3-.6-6.7-3-10.1zM9 13.7c-.8 0-1.5-.8-1.5-1.7s.7-1.7 1.5-1.7 1.5.8 1.5 1.7-.7 1.7-1.5 1.7zm6 0c-.8 0-1.5-.8-1.5-1.7s.7-1.7 1.5-1.7 1.5.8 1.5 1.7-.7 1.7-1.5 1.7z"/>
</svg>
Discord
</a>

</div>
</div>

<script>
const boot = document.getElementById("boot");
const bootText = document.getElementById("boot-text");
const progressWrap = document.getElementById("progress-wrap");
const main = document.getElementById("main");

function syncBarWidth() {
  progressWrap.style.width = bootText.offsetWidth + "px";
}
syncBarWidth();
window.addEventListener("resize", syncBarWidth);

setTimeout(() => boot.classList.add("glitch"), 600);

// bar done at ~1s, pause 1 second, then fade text and bar quickly
setTimeout(() => {
  bootText.style.transition = "opacity 0.15s ease";
  bootText.style.opacity = "0";
  progressWrap.style.transition = "opacity 0.15s ease";
  progressWrap.style.opacity = "0";
}, 2000);

// immediately after text is gone, fade the whole black screen
setTimeout(() => {
  boot.style.transition = "opacity 0.6s ease";
  boot.style.opacity = "0";
}, 2150);

// exactly when fade finishes, cut to main — no overlap, no flash
setTimeout(() => {
  boot.remove();
  main.style.visibility = "visible";
}, 2750);
</script>

</body>
</html>
