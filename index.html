<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jester</title>

<style>
html, body {
margin: 0;
height: 100%;
overflow: hidden;
background: #050505;
color: white;
font-family: Arial, sans-serif;
}

/* BOOT SCREEN */
#boot {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: black;
display: flex;
align-items: center;
justify-content: center;
z-index: 999;

font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 3px;
text-transform: uppercase;

animation: bootFade 3s forwards;
}

@keyframes bootFade {
0% { opacity: 1; }
70% { opacity: 1; }
100% { opacity: 0; visibility: hidden; }
}

/* VIGNETTE (NOW SLIGHT RED HORROR TINT) */
body::before {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 1;

background: radial-gradient(circle,
rgba(0,0,0,0) 35%,
rgba(0,0,0,0.85) 100%),
radial-gradient(circle at 20% 20%,
rgba(120,0,0,0.08),
transparent 40%);

animation: pulseRed 8s infinite;
}

@keyframes pulseRed {
0%,100% { filter: hue-rotate(0deg); opacity: 1; }
50% { opacity: 0.9; }
}

/* SCANLINES */
body::after {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 2;

background: repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.02),
rgba(255,255,255,0.02) 1px,
transparent 3px,
transparent 6px
);

opacity: 0.25;
animation: scanMove 6s linear infinite;
}

@keyframes scanMove {
0% { transform: translateY(0); }
100% { transform: translateY(8px); }
}

/* NOISE */
.noise {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: 3;
background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Random_Noise.png");
opacity: 0.035;
mix-blend-mode: overlay;
animation: noiseMove 0.12s infinite;
}

@keyframes noiseMove {
0% { transform: translate(0,0); }
25% { transform: translate(-2px,1px); }
50% { transform: translate(1px,-1px); }
75% { transform: translate(-1px,2px); }
100% { transform: translate(0,0); }
}

/* CENTER */
.container {
position: absolute;
top: 44%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 5;

display: flex;
flex-direction: column;
align-items: center;

animation: drift 4s infinite;
}

@keyframes drift {
0%,100% { transform: translate(-50%, -50%); }
50% { transform: translate(calc(-50% + 1px), calc(-50% - 1px)); }
}

/* IMAGE (CREPPY PRESENCE FEEL) */
img {
display: block;

max-width: 80%;
max-height: 60vh;
object-fit: contain;

background: transparent;

filter: drop-shadow(0 0 50px rgba(255,255,255,0.03))
        contrast(1.05);

mask-image: radial-gradient(circle,
rgba(0,0,0,1) 60%,
rgba(0,0,0,0) 100%);
-webkit-mask-image: radial-gradient(circle,
rgba(0,0,0,1) 60%,
rgba(0,0,0,0) 100%);

animation: breathe 6s ease-in-out infinite;
}

@keyframes breathe {
0%,100% { transform: scale(1); }
50% { transform: scale(1.02); }
}

/* SOCIALS */
.socials {
margin-top: 18px;
display: flex;
gap: 20px;
}

a {
display: flex;
align-items: center;
gap: 8px;

text-decoration: none;
color: white;

font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;

padding: 8px 12px;
border: 1px solid rgba(255,255,255,0.4);
border-radius: 8px;
transition: 0.2s;
}

a:hover {
background: white;
color: black;
}

/* ICON */
.icon {
width: 18px;
height: 18px;
}

/* RANDOM GLITCH FLASH */
.glitchFlash {
position: fixed;
inset: 0;
background: white;
opacity: 0;
pointer-events: none;
z-index: 10;
mix-blend-mode: difference;
}
</style>
</head>

<body>

<div class="noise"></div>

<div class="container">

<script>
const flash = document.getElementById("flash");
const jester = document.getElementById("jester");

/* glitch flash bursts */
setInterval(() => {
if (Math.random() > 0.88) {
flash.style.opacity = 0.08;
