<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jester System</title>

<style>
html, body {
margin: 0;
height: 100%;
overflow: hidden;
background: #050505;
color: white;
font-family: Arial, sans-serif;
}

#boot {
position: fixed;
inset: 0;
background: black;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 14px;
z-index: 999;
font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 4px;
text-transform: uppercase;
animation: bootFade 2.8s forwards;
}

#boot.glitch #boot-text {
animation: bootShake 0.08s infinite;
}

@keyframes bootShake {
0% { transform: translate(0,0); }
25% { transform: translate(-2px,1px); }
50% { transform: translate(2px,-1px); }
75% { transform: translate(-1px,0); }
100% { transform: translate(0,0); }
}

@keyframes bootFade {
0%   { opacity: 1; }
75%  { opacity: 1; }
99%  { opacity: 0; }
100% { opacity: 0; visibility: hidden; pointer-events: none; }
}

#boot-text {
display: inline-block;
white-space: nowrap;
position: relative;
}

#boot-text::before,
#boot-text::after {
content: attr(data-text);
position: absolute;
left: 0;
top: 0;
width: 100%;
height: 100%;
opacity: 0;
}

#boot-text::before {
color: #050505;
text-shadow: 2px 0 #050505;
animation: glitchTop 3s infinite linear;
clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
}

#boot-text::after {
color: #050505;
text-shadow: -2px 0 #050505;
animation: glitchBot 3s infinite linear;
clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
}

@keyframes glitchTop {
0%   { opacity: 0; transform: translate(0, 0); }
10%  { opacity: 0; }
11%  { opacity: 1; transform: translate(-3px, -2px); }
13%  { opacity: 1; transform: translate(3px, 0); }
15%  { opacity: 0; transform: translate(0, 0); }
40%  { opacity: 0; }
41%  { opacity: 1; transform: translate(2px, -1px); }
43%  { opacity: 0; }
100% { opacity: 0; }
}

@keyframes glitchBot {
0%   { opacity: 0; transform: translate(0, 0); }
20%  { opacity: 0; }
21%  { opacity: 1; transform: translate(3px, 2px); }
23%  { opacity: 1; transform: translate(-3px, 0); }
25%  { opacity: 0; transform: translate(0, 0); }
60%  { opacity: 0; }
61%  { opacity: 1; transform: translate(-2px, 1px); }
63%  { opacity: 0; }
100% { opacity: 0; }
}

#progress-wrap {
height: 2px;
background: rgba(255,255,255,0.15);
position: relative;
border-radius: 2px;
}

#progress-bar {
position: absolute;
left: 0;
top: 0;
height: 100%;
width: 0%;
background: white;
border-radius: 2px;
box-shadow: 0 0 6px rgba(255,255,255,0.6);
animation: fillBar 1.8s ease forwards;
animation-delay: 0.2s;
}

@keyframes fillBar {
0%   { width: 0%; }
100% { width: 100%; }
}

/* glitch overlay that plays on page reveal */
#glitch-reveal {
position: fixed;
inset: 0;
z-index: 998;
pointer-events: none;
background: #050505;
opacity: 0;
animation: revealGlitch 0.6s ease forwards;
animation-delay: 2.75s;
}

@keyframes revealGlitch {
0%   { opacity: 1; clip-path: inset(0 0 0 0); }
15%  { clip-path: inset(10% 0 60% 0); transform: translate(-4px, 0); }
30%  { clip-path: inset(40% 0 20% 0); transform: translate(4px, 0); }
50%  { clip-path: inset(0 0 80% 0); transform: translate(-2px, 0); }
70%  { clip-path: inset(70% 0 0% 0); transform: translate(3px, 0); }
90%  { clip-path: inset(0 0 0 0); transform: translate(0, 0); opacity: 0.4; }
100% { opacity: 0; clip-path: inset(0 0 0 0); }
}

.bg {
position: fixed;
inset: 0;
z-index: 0;
overflow: hidden;
}

.bg img {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
height: 100%;
min-width: 110%;
object-fit: cover;
object-position: bottom;
}

.overlay {
position: fixed;
inset: 0;
z-index: 1;
background: radial-gradient(circle,
rgba(0,0,0,0.2) 20%,
rgba(0,0,0,0.85) 100%);
}

body::after {
content: "";
position: fixed;
inset: 0;
z-index: 2;
pointer-events: none;
background: repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 3px,
transparent 6px
);
opacity: 0.25;
}

.noise {
position: fixed;
inset: 0;
z-index: 3;
pointer-events: none;
background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Random_Noise.png");
opacity: 0.03;
mix-blend-mode: overlay;
}

.container {
position: absolute;
top: 46%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 5;
display: flex;
flex-direction: column;
align-items: center;
}

.socials {
margin-top: 18px;
display: flex;
gap: 20px;
}

a {
display: flex;
align-items: center;
gap: 8px;
text-decoration: none;
color: white;
font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 8px 12px;
border: 1px solid rgba(255,255,255,0.4);
border-radius: 8px;
}

a:hover {
background: white;
color: black;
}

.icon {
width: 18px;
height: 18px;
}
</style>
</head>

<body>

<div id="boot">
  <span id="boot-text" data-text="praisejester">praisejester</span>
  <div id="progress-wrap">

</div>

<div id="glitch-reveal"></div>

<div class="bg">

</div>
</div>

<script>
const boot = document.getElementById("boot");
const bootText = document.getElementById("boot-text");
const progressWrap = document.getElementById("progress-wrap");

function syncBarWidth() {
  progressWrap.style.width = bootText.offsetWidth + "px";
}
syncBarWidth();
window.addEventListener("resize", syncBarWidth);

setTimeout(() => boot.classList.add("glitch"), 1000);
setTimeout(() => {
  boot.style.opacity = "0";
  boot.style.visibility = "hidden";
  boot.style.pointerEvents = "none";
}, 2750);
setTimeout(() => boot.remove(), 2800);
</script>

</body>
</html>
