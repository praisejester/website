<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jester System</title>

<style>
html, body {
margin: 0;
height: 100%;
overflow: hidden;
background: #050505;
color: white;
font-family: Arial, sans-serif;
cursor: none;
}

/* FORCE NO DEFAULT CURSOR ANYWHERE */
*,
*::before,
*::after {
cursor: none !important;
}

/* ================= CURSOR ================= */
#cursor {
position: fixed;
top: 0;
left: 0;
width: 10px;
height: 10px;
border-radius: 50%;
background: white;
mix-blend-mode: difference;
pointer-events: none;
z-index: 9999;
transform: translate(-50%, -50%);
box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* ================= STOP LINK URL PREVIEW ================= */
a {
text-decoration: none;
cursor: none !important;
}

a:focus,
a:active {
outline: none;
}

/* ================= BOOT ================= */
#boot {
position: fixed;
inset: 0;
background: black;
display: flex;
align-items: center;
justify-content: center;
z-index: 999;
font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 4px;
text-transform: uppercase;
animation: bootFade 2.4s forwards;
}

@keyframes bootFade {
0% { opacity: 1; }
70% { opacity: 1; }
100% { opacity: 0; visibility: hidden; }
}

/* ================= TEAR EFFECT ================= */
#tear {
position: fixed;
inset: 0;
z-index: 998;
pointer-events: none;
}

.tear-line {
position: absolute;
left: 0;
width: 100%;
height: 3px;
background: black;
transform: scaleX(0);
}

#tear.active .tear-line {
animation: tearOpen 0.7s ease forwards;
}

.tear1 { top: 12%; animation-delay: 0.05s; }
.tear2 { top: 30%; animation-delay: 0.12s; }
.tear3 { top: 50%; animation-delay: 0.18s; }
.tear4 { top: 70%; animation-delay: 0.24s; }
.tear5 { top: 88%; animation-delay: 0.30s; }

@keyframes tearOpen {
0% { transform: scaleX(0); opacity: 1; }
40% { transform: scaleX(1.2); }
70% { transform: scaleX(1); }
100% { transform: scaleX(0); opacity: 0; }
}

/* ================= BACKGROUND ================= */
.bg {
position: fixed;
inset: 0;
z-index: 0;
overflow: hidden;
}

.bg img {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
height: 100%;
min-width: 110%;
object-fit: cover;
object-position: bottom;
}

.overlay {
position: fixed;
inset: 0;
z-index: 1;
background: radial-gradient(circle,
rgba(0,0,0,0.2) 20%,
rgba(0,0,0,0.85) 100%);
}

/* SCANLINES */
body::after {
content: "";
position: fixed;
inset: 0;
z-index: 2;
pointer-events: none;
background: repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03),
rgba(255,255,255,0.03) 1px,
transparent 3px,
transparent 6px
);
opacity: 0.25;
}

/* NOISE */
.noise {
position: fixed;
inset: 0;
z-index: 3;
pointer-events: none;
background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Random_Noise.png");
opacity: 0.03;
mix-blend-mode: overlay;
}

/* ================= CONTENT ================= */
.container {
position: absolute;
top: 46%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 5;
display: flex;
flex-direction: column;
align-items: center;
}

.socials {
margin-top: 18px;
display: flex;
gap: 20px;
}

a {
display: flex;
align-items: center;
gap: 8px;
color: white;
font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 8px 12px;
border: 1px solid rgba(255,255,255,0.4);
border-radius: 8px;
}

a:hover {
background: white;
color: black;
}

.icon {
width: 18px;
height: 18px;
}
</style>
</head>

<body>

<div id="cursor"></div>

<div id="tear">
  <div class="tear-line tear1"></div>
  <div class="tear-line tear2"></div>
  <div class="tear-line tear3"></div>
  <div class="tear-line tear4"></div>
  <div class="tear-line tear5"></div>
</div>

<div id="boot">INITIALIZING SYSTEM...</div>

<div class="bg">

</div>

<script>
const boot = document.getElementById("boot");
const tear = document.getElementById("tear");
const cursor = document.getElementById("cursor");

setTimeout(() => tear.classList.add("active"), 1900);
setTimeout(() => boot.remove(), 2600);

let mouseX = 0, mouseY = 0;
let curX = 0, curY = 0;

window.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animateCursor() {
  curX += (mouseX - curX) * 0.12;
  curY += (mouseY - curY) * 0.12;

  cursor.style.left = curX + "px";
  cursor.style.top = curY + "px";

  requestAnimationFrame(animateCursor);
}

animateCursor();
</script>

</body>
