<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jester System</title>

<style>
html, body {
margin: 0;
height: 100%;
overflow: hidden;
background: #050505;
color: white;
font-family: Arial, sans-serif;
}

/* BOOT SCREEN */
#boot {
position: fixed;
inset: 0;
background: black;
display: flex;
align-items: center;
justify-content: center;
z-index: 999;

font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 3px;
text-transform: uppercase;

animation: bootFade 3s forwards;
}

@keyframes bootFade {
0% { opacity: 1; }
70% { opacity: 1; }
100% { opacity: 0; visibility: hidden; }
}

/* BACKGROUND WRAPPER */
.bg {
position: fixed;
inset: 0;
overflow: hidden;
z-index: 0;
}

/* 🔥 ANCHORED GIF (BOTTOM FIX) */
.bg img {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);

width: auto;
height: 100%;
min-width: 110%;

/* make it feel part of environment */
object-fit: cover;
object-position: bottom;

/* creepy cinematic look */
filter: blur(1px) brightness(0.55) contrast(1.1);
}

/* DARK OVERLAY */
.overlay {
position: fixed;
inset: 0;
z-index: 1;
background: radial-gradient(circle,
rgba(0,0,0,0.2) 20%,
rgba(0,0,0,0.85) 100%);
}

/* SCANLINES */
body::after {
content: "";
position: fixed;
inset: 0;
z-index: 2;
pointer-events: none;

background: repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.02),
rgba(255,255,255,0.02) 1px,
transparent 3px,
transparent 6px
);

opacity: 0.25;
}

/* NOISE */
.noise {
position: fixed;
inset: 0;
z-index: 3;
pointer-events: none;

background: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Random_Noise.png");
opacity: 0.03;
mix-blend-mode: overlay;
}

/* CONTENT */
.container {
position: absolute;
top: 46%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 5;

display: flex;
flex-direction: column;
align-items: center;
}

/* SOCIALS */
.socials {
margin-top: 18px;
display: flex;
gap: 20px;
}

a {
display: flex;
align-items: center;
gap: 8px;

text-decoration: none;
color: white;

font-family: "Courier New", monospace;
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;

padding: 8px 12px;
border: 1px solid rgba(255,255,255,0.4);
border-radius: 8px;
transition: 0.2s;
}

a:hover {
background: white;
color: black;
}

.icon {
width: 18px;
height: 18px;
}
</style>
</head>
